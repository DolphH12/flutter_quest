name: flutter_quest
description: "Flutter Quest - gamified Dart and Flutter learning app."
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.3.2
  go_router: ^14.8.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^4.1.1
  file_selector: ^1.0.3
  path_provider: ^2.1.5
  share_plus: ^11.0.0
  lite_code_editor: ^0.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: assets/images/LOGO_FC.png
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/images/LOGO_FC.png
    background_color: "#FFFFFF"
    theme_color: "#005E9E"
  windows:
    generate: true
    image_path: assets/images/LOGO_FC.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/images/LOGO_FC.png

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/content/
    - assets/images/
